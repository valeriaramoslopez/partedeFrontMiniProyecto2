<div class="catalogo-pagina">
    <div class="catalogo-header">
        <h1>Catálogo de Mangas</h1>
        <p>{{productosFiltrados.length}} títulos disponibles</p>
    </div>
    
    <div class="catalogo-contenido">
        <aside class="sidebar">
            <h3>Géneros</h3>
            <ul class="genero-lista">
                <li
                    *ngFor="let genero of generos"
                    (click)="filtrarPorGenero(genero)"
                    [ngClass]="{'activo':generoSeleccionado===genero}"
                    class="genero-item">
                    {{ genero }}

                </li>
            </ul>
        </aside>

        <div class="manga-grid">
            <div class="manga-card" *ngFor="let producto of productosFiltrados">
                <div class="card-cover">
                    <img
                        [src]="producto.imagen"
                        [alt]="producto.titulo"
                        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"
                    />
                    <div class="card-imagen">IMG</div>
                </div>
                <div class="card-info">
                    <span class="card-genero" [ngClass]="'genero-' + producto.genero.toLowerCase()">
                        {{ producto.genero }}
                    </span>
                    <h3>{{ producto.titulo }}</h3>
                    <p>{{ producto.autor }} · Vol. {{ producto.volumen }}</p>
                    <span class="precio">{{ producto.precio | currency:'MXN':'symbol':'1.0-0' }}</span>
                        <div class="card-footer">
                            <a [routerLink]="['/detalles', producto.id]" class="btn-small">Ver Más</a>
                            <button
                                class="btn-small btn-carrito"
                                (click)="agregarAlCarrito(producto)"
                                [disabled]="producto.disponible===0"
                                [ngClass]="{'agregado': agregadoId===producto.id}">
                                {{agregadoId===producto.id ?'Agregado':'Agregar'}}
                            </button>
                        </div>

                </div>
            </div>
        </div>
    </div>
</div>
